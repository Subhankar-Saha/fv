<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Credentials Vault</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══ INITIAL LOADER ══ -->
<div id="app-spinner">
  <div class="spinner-ring"></div>
  <p class="spinner-text">Loading vault…</p>
</div>

<!-- ══ LOCK SCREEN ══ -->
<div id="lock-screen" style="display:none">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h1>Family Credentials Vault</h1>
    <p class="lock-sub">Select your profile and enter your password</p>

    <!-- User cards — populated by auth.js from localStorage -->
    <div class="user-grid" id="user-grid"></div>

    <input type="password" id="pwd-input" placeholder="Enter password" />
    <button class="lock-btn" onclick="unlock()">Unlock Vault</button>
    <p class="lock-error" id="pwd-error">❌ Wrong password. Try again.</p>

    <button class="btn-add-user-toggle" onclick="toggleAddUserForm()">＋ Add Member</button>
  </div>
</div>

<!-- ══ ADD MEMBER MODAL ══ -->
<div id="member-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)toggleAddUserForm()">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Add New Member</h2>
      <button class="modal-close" onclick="toggleAddUserForm()">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-group avatar-row">
        <label>Avatar</label>
        <input type="text" id="new-user-emoji" placeholder="👤" maxlength="4" class="input-emoji" />
        <span class="form-hint">Any emoji</span>
      </div>

      <div class="form-group">
        <label for="new-user-name">Full Name <span class="required">*</span></label>
        <input type="text" id="new-user-name" placeholder="e.g. Subha Das" />
      </div>

      <div class="form-group">
        <label for="new-user-mobile">Mobile Number <span class="required">*</span></label>
        <div class="input-prefix-wrap">
          <span class="input-prefix">+91</span>
          <input type="tel" id="new-user-mobile" placeholder="10-digit number" maxlength="10"
                 oninput="this.value=this.value.replace(/\D/g,'')" />
        </div>
        <span class="form-hint">Used as unique ID — cannot be changed later</span>
        <span class="field-error" id="mobile-error"></span>
      </div>

      <div class="form-group">
        <label for="new-user-pass">Password <span class="required">*</span></label>
        <input type="password" id="new-user-pass" placeholder="Min 4 characters" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="toggleAddUserForm()">Cancel</button>
      <button class="btn-modal-submit" onclick="addUser()">Add Member</button>
    </div>
  </div>
</div>

<!-- ══ VAULT ══ -->
<div id="vault" style="display:none">
  <header>
    <div class="header-left">
      <div class="header-logo">🏦</div>
      <div>
        <h1 id="vault-title">Vault</h1>
        <p id="vault-subtitle"></p>
      </div>
    </div>
    <div class="header-actions">
      <span id="unsaved-dot" class="unsaved-dot" style="display:none" title="Auto-saving…">● saving</span>
      <button class="btn-sm btn-save"   onclick="exportJSON()">💾 Export JSON</button>
      <label  class="btn-sm btn-import" title="Restore from backup">
        📥 Import
        <input type="file" accept=".json" style="display:none" onchange="importJSON(this)">
      </label>
      <button class="btn-sm btn-print" onclick="window.print()">🖨️ Print</button>
      <button class="btn-sm"           onclick="lockVault()">🔒 Lock</button>
    </div>
  </header>
  <div class="container" id="vault-container"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
